name: Run AI Video Arena Server with Ngrok

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-server:
    name: Build & Host Express Server with Playwright
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node Project Dependencies
        run: npm install

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies & Playwright
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium
          python -c "from pyngrok import ngrok; ngrok.install_ngrok()"

      - name: Compile Client
        run: npm run build
        env:
          NODE_ENV: production

      - name: Start Server with Ngrok Tunneling
        run: npm start
        env:
          NODE_ENV: production
          PORT: 3000
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
